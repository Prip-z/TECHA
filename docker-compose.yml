services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${PG_DB:-hackback}
      POSTGRES_USER: ${PG_USER:-hackback}
      POSTGRES_PASSWORD: ${PG_PASS:-hackback}
    ports:
      - "${DB_EXTERNAL_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - db
    environment:
      APP_NAME: ${APP_NAME:-HackBack Backend}
      APP_ENV: ${APP_ENV:-local}
      DEBUG: ${DEBUG:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173}
      PG_HOST: db
      PG_PORT: 5432
      PG_DB: ${PG_DB:-hackback}
      PG_USER: ${PG_USER:-hackback}
      PG_PASS: ${PG_PASS:-hackback}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
    ports:
      - "${BACKEND_EXTERNAL_PORT:-8000}:8000"
    networks:
      - app-net
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend-plan-b
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${FRONTEND_API_BASE_URL:-http://localhost:8000}
        VITE_WS_BASE_URL: ${FRONTEND_WS_BASE_URL:-ws://localhost:8000}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_EXTERNAL_PORT:-3000}:80"
    networks:
      - app-net
    restart: unless-stopped

networks:
  app-net:
    name: hackback-app
    driver: bridge

volumes:
  postgres_data:
